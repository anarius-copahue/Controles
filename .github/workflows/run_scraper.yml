name: Ejecutar Scraping Diario

on:
  schedule:
    - cron: '0 8 * * *' # Corre todos los días de forma automática
  workflow_dispatch: # Activa un botón en GitHub para ejecutarlo manualmente cuando quieras

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar el Scraper Unificado
      env:
        DISPRO_USER: ${{ secrets.DISPRO_USER }}
        DISPRO_PASSWORD: ${{ secrets.DISPRO_PASSWORD }}
        CAVIAHUE_SHOP_DOMAIN: ${{ secrets.CAVIAHUE_SHOP_DOMAIN }}
        CAVIAHUE_SHOP_TOKEN: ${{ secrets.CAVIAHUE_SHOP_TOKEN }}
      run: python scraper.py

    - name: Subir cambios al repositorio
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add descargas/*.csv last_scrape.txt
        git diff-index --quiet HEAD || git commit -m "Actualización automática de reportes comerciales"
        git push
