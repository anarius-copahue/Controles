name: Ejecutar Scraping y Encriptación Diaria

on:
  schedule:
    # Se ejecuta todos los días a las 05:00 UTC (02:00 AM de Argentina)
    - cron: '0 5 * * *'
  workflow_dispatch: # Permite ejecutar el proceso manualmente desde la web de GitHub

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1. Copiar el código del repositorio en el servidor de GitHub
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Configurar Python en su versión estable
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instalar Google Chrome (necesario para Selenium Headless)
    - name: Instalar Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    # 4. Instalar las librerías del proyecto
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. Ejecutar el scraper pasándole las credenciales y la clave de cifrado
    - name: Ejecutar Scraper y Cifrado
      env:
        DISPRO_USER: ${{ secrets.DISPRO_USER }}
        DISPRO_PASSWORD: ${{ secrets.DISPRO_PASSWORD }}
        CAVIAHUE_SHOP_DOMAIN: ${{ secrets.CAVIAHUE_SHOP_DOMAIN }}
        CAVIAHUE_SHOP_TOKEN: ${{ secrets.CAVIAHUE_SHOP_TOKEN }}
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }} # 🔒 Inyección de la clave secreta
      run: python scraper.py

    # 6. Guardar de forma segura los archivos encriptados y el log en tu repositorio
    - name: Subir cambios cifrados al repositorio
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # Agregamos solo los encriptados y el archivo de estado
        git add descargas/*.encrypted last_scrape.txt
        
        # Confirmamos cambios solo si el scraper generó datos nuevos
        git diff-index --quiet HEAD || git commit -m "Actualización cifrada automática de reportes comerciales"
        git push
