name: Ejecutar Scraping y Encriptación Diaria

on:
  schedule:
    # ⏱️ Se ejecuta exactamente a las 8, 10, 13, 15 y 17 horas de Argentina (UTC-3)
    - cron: '0 5,7,10,12,14 * * *'
  workflow_dispatch: # Permite seguir ejecutando el proceso a mano con el botón

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1. Copiar el código del repositorio en el servidor limpio de GitHub
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Configurar el entorno virtual de Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

# 3. Instalar Google Chrome y limpiar TODO Chromedriver obsoleto del sistema
    - name: Instalar Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        # Forzamos la eliminación en todas las rutas comunes de GitHub Actions
        sudo rm -f /usr/bin/chromedriver
        sudo rm -f /usr/local/bin/chromedriver
        sudo rm -f /opt/hostedtoolcache/chromedriver

    # 4. Instalar todas las librerías necesarias desde tu requirements.txt
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. Ejecutar el scraper inyectando los secretos guardados en GitHub Settings
    - name: Ejecutar Scraper y Cifrado
      env:
        DISPRO_USER: ${{ secrets.DISPRO_USER }}
        DISPRO_PASSWORD: ${{ secrets.DISPRO_PASSWORD }}
        CAVIAHUE_SHOP_DOMAIN: ${{ secrets.CAVIAHUE_SHOP_DOMAIN }}
        CAVIAHUE_SHOP_TOKEN: ${{ secrets.CAVIAHUE_SHOP_TOKEN }}
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        GITHUB_ACTIONS: "true" # Flag para avisarle al setup_driver() que configure Linux correctamente
      run: python scraper.py

    # 6. Sincronizar el repositorio guardando solo los reportes cifrados y la marca de tiempo
    - name: Subir cambios cifrados al repositorio
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # Aseguramos que la carpeta exista en el entorno virtual
        mkdir -p descargas
        
        # Agrega los archivos encriptados de forma segura (solo si existen)
        if ls descargas/*.encrypted 1> /dev/null 2>&1; then
          git add descargas/*.encrypted
          echo "Archivos encriptados encontrados y agregados a Git."
        else
          echo "No se encontraron archivos encriptados para agregar en esta corrida."
        fi
        
        # Agregamos la marca de tiempo de forma segura (solo si existe)
        if [ -f last_scrape.txt ]; then
          git add last_scrape.txt
          echo "Archivo last_scrape.txt encontrado y agregado."
        else
          echo "Aviso: No se generó last_scrape.txt en esta corrida."
        fi
        
        # Confirma y sube los cambios solo si hubo modificaciones reales contra el repo
        git diff-index --quiet HEAD || git commit -m "Actualización cifrada automática de reportes comerciales"
        git push